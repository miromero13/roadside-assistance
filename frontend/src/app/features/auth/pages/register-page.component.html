<div class="flex min-h-screen items-center justify-center bg-slate-100 px-4 py-10">
  <section hlmCard class="w-full max-w-md bg-white p-6 shadow-sm sm:p-8">
    <div hlmCardHeader class="space-y-2 p-0">
      <h1 hlmCardTitle class="text-2xl">Registro conductor</h1>
      <p hlmCardDescription>Crea tu cuenta para solicitar asistencia.</p>
    </div>

    <div hlmCardContent class="space-y-5 p-0">
      <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="space-y-2">
            <label for="nombre" class="text-sm font-medium text-slate-900">Nombre</label>
            <input id="nombre" hlmInput formControlName="nombre" autocomplete="given-name" />
          </div>

          <div class="space-y-2">
            <label for="apellido" class="text-sm font-medium text-slate-900">Apellido</label>
            <input id="apellido" hlmInput formControlName="apellido" autocomplete="family-name" />
          </div>
        </div>

        <div class="space-y-2">
          <label for="email" class="text-sm font-medium text-slate-900">Correo</label>
          <input id="email" hlmInput type="email" formControlName="email" autocomplete="email" />
        </div>

        <div class="space-y-2">
          <label for="telefono" class="text-sm font-medium text-slate-900">Teléfono</label>
          <input id="telefono" hlmInput formControlName="telefono" autocomplete="tel" />
        </div>

        <div class="space-y-2">
          <label for="password" class="text-sm font-medium text-slate-900">Contraseña</label>
          <input id="password" hlmInput type="password" formControlName="password" autocomplete="new-password" />
        </div>

        @if (errorMessage()) {
          <p class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ errorMessage() }}</p>
        }

        <button hlmBtn class="w-full" type="submit" [disabled]="form.invalid || loading()">
          {{ loading() ? 'Creando cuenta...' : 'Crear cuenta' }}
        </button>
      </form>

      <p class="text-sm text-slate-600 text-center">
        ¿Ya tienes cuenta?
        <a routerLink="/auth/login" class="font-medium text-slate-900 underline">Inicia sesión</a>
      </p>
    </div>
  </section>
</div>
