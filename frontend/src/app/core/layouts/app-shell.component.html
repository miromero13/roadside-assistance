<div hlmSidebarWrapper class="text-slate-900">
  <hlm-sidebar collapsible="icon" variant="inset" side="left">
    <header hlmSidebarHeader class="border-b border-sidebar-border/70 px-3 py-4">
      <div class="flex items-center gap-3">
        <button hlmSidebarTrigger type="button" aria-label="Abrir o cerrar navegación"></button>
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold">ACI Web</p>
          <p class="truncate text-xs text-sidebar-foreground/70">Panel operativo</p>
        </div>
      </div>
    </header>

    <div hlmSidebarContent class="px-2 py-3">
      @for (section of sidebarSections(); track section.title ?? section.items[0].route; let last = $last) {
        <!-- @if (section.title) {
          <div class="px-2 pb-2 pt-1 text-xs font-medium uppercase tracking-wide text-sidebar-foreground/60">
            {{ section.title }}
          </div>
        } -->

        <ul hlmSidebarMenu class="space-y-1">
          @for (item of section.items; track item.route) {
            <li hlmSidebarMenuItem>
              <a
                hlmSidebarMenuButton
                [routerLink]="item.route"
                routerLinkActive
                #active="routerLinkActive"
                [isActive]="active.isActive"
                [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
              >
                <ng-icon [name]="item.icon"></ng-icon>
                <span>{{ item.label }}</span>
              </a>
            </li>
          }
        </ul>
<!-- 
        @if (!last) {
          <div hlmSidebarSeparator class="my-3"></div>
        } -->
      }
    </div>
  </hlm-sidebar>

  <main hlmSidebarInset class="min-h-svh">
    <header class="sticky top-0 z-10 flex items-center justify-between border-b border-slate-200 bg-white/90 px-4 py-3 backdrop-blur sm:px-6">
      <div class="flex items-center gap-3">
        <button hlmSidebarTrigger type="button" class="md:hidden" aria-label="Abrir navegación"></button>
        <div>
          <p class="text-lg font-semibold">ACI Web</p>
          <p class="text-xs text-slate-500">Panel operativo</p>
        </div>
      </div>

      <div class="flex items-center gap-3 text-sm">
        <div class="text-right">
          <p class="font-medium">{{ fullName() }}</p>
          <p class="text-xs uppercase tracking-wide text-slate-500">{{ userRoleLabel() }}</p>
        </div>
        <button
          type="button"
          class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50"
          (click)="logout()"
        >
          Cerrar sesión
        </button>
      </div>
    </header>

    <div class="p-4 sm:p-6">
      <router-outlet />
    </div>
  </main>
</div>
